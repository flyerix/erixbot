services:
  - type: web
    name: telegram-bot
    plan: free
    docker:
      dockerfilePath: ./Dockerfile
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false  # User must set this
      - key: DATABASE_URL
        fromDatabase:
          name: bot-database
          property: connectionString
      - key: ADMIN_IDS
        sync: false  # User must set this
      - key: OPENAI_API_KEY
        sync: false  # Optional
      - key: RENDER
        value: "true"

databases:
  - name: bot-database
    plan: free
    region: frankfurt
    databaseName: botdb
    user: botuser
