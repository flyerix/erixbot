services:
  - type: web
    name: erixcastbot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app/main.py
    healthCheckPath: /
    restartPolicy: on_failure
    autoDeploy: true
    # Enhanced configuration for 24/7 availability
    maxShutdownDelaySeconds: 30
    healthCheckTimeout: 30
    # Environment variables for uptime monitoring
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        fromSecret: telegram_bot_token
      - key: DATABASE_URL
        fromSecret: database_url
      - key: OPENAI_API_KEY
        fromSecret: openai_api_key
      - key: ADMIN_IDS
        fromSecret: admin_ids
      - key: PORT
        value: 10000
      - key: WEBHOOK_URL
        fromSecret: webhook_url
      - key: RENDER_URL
        fromSecret: render_url
      - key: STARTUP_DELAY
        value: 60
